name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Validate release version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          if ($packageVersion -ne $tagVersion) {
            throw "Tag version $tagVersion does not match package version $packageVersion."
          }

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Smoke tests
        shell: pwsh
        run: |
          npm test 2>&1 | Tee-Object -FilePath smoke-test.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            $logTail = Get-Content smoke-test.log -Tail 100
            $annotation = ($logTail -join "`n").Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=Smoke tests failed::$annotation"
            exit $exitCode
          }

      - name: Build icons
        run: npm run icons:build

      - name: Build GUI
        run: npm run gui:build

      - name: Prepare bundled Node.js
        run: node scripts/prepare-electron-builder.mjs

      - name: Build Windows installer
        shell: pwsh
        run: |
          npx electron-builder --win nsis --x64 --publish never 2>&1 | Tee-Object -FilePath release-build.log
          $exitCode = $LASTEXITCODE
          if ($exitCode -ne 0) {
            "## Windows installer build failed" >> $env:GITHUB_STEP_SUMMARY
            '```text' >> $env:GITHUB_STEP_SUMMARY
            $logTail = Get-Content release-build.log -Tail 100
            $logTail >> $env:GITHUB_STEP_SUMMARY
            '```' >> $env:GITHUB_STEP_SUMMARY
            $annotation = ($logTail -join "`n").Replace('%', '%25').Replace("`r", '%0D').Replace("`n", '%0A')
            Write-Output "::error title=Windows installer build failed::$annotation"
            exit $exitCode
          }

      - name: Validate release assets
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $assets = @(
            "release/Local Model Router Setup $version.exe",
            "release/Local Model Router Setup $version.exe.blockmap",
            "release/latest.yml"
          )
          foreach ($asset in $assets) {
            if (-not (Test-Path $asset -PathType Leaf)) {
              throw "Missing release asset: $asset"
            }
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/Local Model Router Setup *.exe
            release/Local Model Router Setup *.exe.blockmap
            release/latest.yml