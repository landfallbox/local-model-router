name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate release version
        shell: pwsh
        run: |
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          if ($packageVersion -ne $tagVersion) {
            throw "Tag version $tagVersion does not match package version $packageVersion."
          }

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Smoke tests
        run: npm test

      - name: Build Windows installer
        run: npm run dist:windows

      - name: Validate release assets
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $assets = @(
            "release/Local Model Router Setup $version.exe",
            "release/Local Model Router Setup $version.exe.blockmap",
            "release/latest.yml"
          )
          foreach ($asset in $assets) {
            if (-not (Test-Path $asset -PathType Leaf)) {
              throw "Missing release asset: $asset"
            }
          }

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/Local Model Router Setup *.exe
            release/Local Model Router Setup *.exe.blockmap
            release/latest.yml